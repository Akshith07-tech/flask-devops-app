name: CI/CD to Minikube on EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Copy code and deploy to EC2
      env:
        EC2_IP: 13.59.147.88
      run: |
        # Save private key from GitHub Secrets to a temp file
        echo "${{ secrets.EC2_SSH_KEY }}" > flask-devops-ci
        chmod 600 flask-devops-ci

        # Copy project to EC2
        rsync -avz -e "ssh -o StrictHostKeyChecking=no -i flask-devops-ci" ./ ubuntu@$EC2_IP:/home/ubuntu/flask-devops-app

        # SSH into EC2 and deploy
        ssh -o StrictHostKeyChecking=no -i flask-devops-ci ubuntu@$EC2_IP << 'EOF'
        cd /home/ubuntu/flask-devops-app
        # Build Docker image
        docker build -t flask-devops-app:latest .
        # Load image into Minikube
        minikube image load flask-devops-app:latest
        # Update Kubernetes deployment
        kubectl set image deployment/flask-deployment flask-container=flask-devops-app:latest
        EOF
